<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InterLab</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            font-family: "Segoe UI", sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
        }

        .logo {
            color: white;
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        .login-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;

            padding: 18px 38px;
            border: none;
            border-radius: 18px;

            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);

            color: white;
            font-size: 18px;
            font-weight: 600;
            text-decoration: none;

            cursor: pointer;
            transition: all 0.25s ease;

            box-shadow:
                0 8px 32px rgba(0,0,0,0.25),
                inset 0 1px 0 rgba(255,255,255,0.08);
        }

        .login-btn:hover {
            transform: translateY(-3px) scale(1.02);
            background: rgba(255, 255, 255, 0.14);
            box-shadow:
                0 12px 36px rgba(0,0,0,0.35),
                0 0 24px rgba(99,102,241,0.35);
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        .arrow {
            font-size: 20px;
            transition: transform 0.2s ease;
        }

        .login-btn:hover .arrow {
            transform: translateX(4px);
        }

        .footer {
            margin-top: 24px;
            color: rgba(255,255,255,0.5);
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">InterLab</div>

        <a class="login-btn" href="https://InterLab.intermark.global">
            Log in to InterLab
            <span class="arrow">→</span>
        </a>

        <div class="footer">
            Intermark Global
        </div>
    </div>

</body>
</html>
